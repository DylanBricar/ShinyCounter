name: "CI"

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-ci-

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libgtk-3-dev \
            libssl-dev \
            libudev-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libxcb1-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libclang-dev \
            clang \
            pkg-config

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all

name: "Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

# Serialize release runs so the second one waits for the first to finish.
# Without this, two concurrent workflows can both create drafts, race on the
# tag bump, or - worse - have one's "clean up stale drafts" step delete the
# release the other is still uploading assets to, which surfaces as a
# 404 Not Found during the asset upload step.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-validate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-validate-

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libgtk-3-dev \
            libssl-dev \
            libudev-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libegl-dev \
            libgbm-dev \
            libdrm-dev \
            libxcb1-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libclang-dev \
            clang \
            pkg-config

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all

  create-release:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.get-version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the GITHUB_TOKEN so the subsequent `git push` of the new tag
          # is authenticated.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next version from existing git tags
        id: get-version
        shell: bash
        run: |
          set -euo pipefail
          # Make sure we have every tag locally - checkout may only fetch
          # the default branch refs.
          git fetch --tags origin --prune --force || true
          # Highest v*.*.* tag, sorted numerically across the three components.
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
            | sed 's/^v//' \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | tail -1 || true)
          if [ -z "$LATEST" ]; then
            NEXT="0.1.0"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="$MAJOR.$MINOR.$((PATCH+1))"
          fi
          echo "Latest tag: ${LATEST:-<none>}"
          echo "Next version: $NEXT"
          {
            echo "version=$NEXT"
            echo "tag=v$NEXT"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push the git tag
        env:
          TAG: ${{ steps.get-version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally - bumping logic was wrong" >&2
            exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Generate changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const version = '${{ steps.get-version.outputs.version }}';
            // Only consider published releases (drafts were just deleted; we
            // also defensively filter again so the diff link is stable).
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 20,
            });
            const prevTag = releases.find(r => !r.draft && !r.prerelease)?.tag_name || '';
            let commits = [];
            if (prevTag) {
              try {
                const { data: comparison } = await github.rest.repos.compareCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  base: prevTag,
                  head: 'main',
                });
                commits = comparison.commits.map(c => c.commit.message.split('\n')[0]);
              } catch (e) {
                core.warning(`Could not compare against ${prevTag}: ${e.message}`);
              }
            }
            const groups = {
              'Features': [],
              'Bug Fixes': [],
              'Improvements': [],
              'CI / Build': [],
              'Other': [],
            };
            for (const msg of commits) {
              if (msg.startsWith('feat')) groups['Features'].push(msg);
              else if (msg.startsWith('fix')) groups['Bug Fixes'].push(msg);
              else if (msg.startsWith('refactor') || msg.startsWith('perf') || msg.startsWith('chore')) groups['Improvements'].push(msg);
              else if (msg.startsWith('ci') || msg.startsWith('build')) groups['CI / Build'].push(msg);
              else if (!msg.toLowerCase().startsWith('merge')) groups['Other'].push(msg);
            }
            let body = `## What's new in v${version}\n\n`;
            for (const [title, items] of Object.entries(groups)) {
              if (items.length === 0) continue;
              body += `### ${title}\n`;
              for (const item of items) {
                const clean = item.replace(/^(feat|fix|refactor|perf|chore|ci|build)(\(.*?\))?:\s*/, '');
                body += `- ${clean}\n`;
              }
              body += '\n';
            }
            if (prevTag) {
              body += `**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prevTag}...v${version}\n`;
            }
            return body;

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.get-version.outputs.version }}
          RELEASE_TAG: ${{ steps.get-version.outputs.tag }}
          RELEASE_BODY: ${{ steps.changelog.outputs.result }}
        with:
          script: |
            const version = process.env.RELEASE_VERSION;
            const tag = process.env.RELEASE_TAG;
            const body = process.env.RELEASE_BODY;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Shiny Counter ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_glob: "target/x86_64-unknown-linux-gnu/release/shiny_counter"
            asset_name: "ShinyCounter-${VERSION}-linux-x86_64.tar.gz"
            archive_kind: tar
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_glob: "target/aarch64-unknown-linux-gnu/release/shiny_counter"
            asset_name: "ShinyCounter-${VERSION}-linux-aarch64.tar.gz"
            archive_kind: tar
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_glob: "target/x86_64-pc-windows-msvc/release/shiny_counter.exe"
            asset_name: "ShinyCounter-${VERSION}-windows-x86_64.exe"
            archive_kind: exe
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            artifact_glob: "target/aarch64-apple-darwin/release/shiny_counter"
            asset_name: "ShinyCounter-${VERSION}-macos-aarch64.dmg"
            archive_kind: macapp
          # Intel macOS is cross-compiled from an Apple Silicon runner - the
          # dedicated `macos-13` (Intel) image is being phased out and its
          # queue can stall jobs for 10+ minutes. macOS ships a universal
          # toolchain so this Just Works.
          - name: macos-x86_64
            os: macos-14
            target: x86_64-apple-darwin
            artifact_glob: "target/x86_64-apple-darwin/release/shiny_counter"
            asset_name: "ShinyCounter-${VERSION}-macos-x86_64.dmg"
            archive_kind: macapp

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v4
        with:
          # Build the exact commit the tag points to, not whatever happens to
          # be at HEAD when the matrix gets dispatched.
          ref: ${{ needs.create-release.outputs.tag }}
          fetch-depth: 1

      - name: Sync Cargo.toml version with the release tag
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        with:
          script: |
            const fs = require('fs');
            const v = process.env.VERSION;
            const file = 'Cargo.toml';
            const original = fs.readFileSync(file, 'utf8');
            // Replace only the first `version = "..."` line - that's the
            // [package] one. We don't want to touch any dep version.
            const updated = original.replace(/^version = "[^"]*"/m, `version = "${v}"`);
            fs.writeFileSync(file, updated);
            core.info(`Cargo.toml version set to ${v}`);

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libgtk-3-dev \
            libssl-dev \
            libudev-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libegl-dev \
            libgbm-dev \
            libdrm-dev \
            libxcb1-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libclang-dev \
            clang \
            pkg-config

      - name: Build release binary
        shell: bash
        # Not using `--locked` because the version sync step above just
        # bumped Cargo.toml; cargo regenerates the lock against the new
        # package version on first build.
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact (Unix tarball - binary only)
        if: matrix.archive_kind == 'tar'
        shell: bash
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          SRC: ${{ matrix.artifact_glob }}
          OUT: ${{ matrix.asset_name }}
        run: |
          set -eux
          OUT_NAME=$(echo "$OUT" | sed "s/\${VERSION}/$VERSION/")
          # Bundle just the binary, nothing else - README / LICENSE live on
          # the GitHub repo page.
          STAGE_DIR=$(mktemp -d)
          cp "$SRC" "$STAGE_DIR/shiny_counter"
          chmod +x "$STAGE_DIR/shiny_counter"
          tar -C "$STAGE_DIR" -czf "$OUT_NAME" shiny_counter
          rm -rf "$STAGE_DIR"
          echo "ASSET_PATH=$OUT_NAME" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$OUT_NAME" >> "$GITHUB_ENV"

      - name: Stage artifact (Windows bare .exe)
        if: matrix.archive_kind == 'exe'
        shell: pwsh
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          SRC: ${{ matrix.artifact_glob }}
          OUT: ${{ matrix.asset_name }}
        run: |
          $version = $env:VERSION
          $outName = $env:OUT.Replace('${VERSION}', $version)
          # Upload the .exe straight - no zip, no README, no LICENSE.
          Copy-Item $env:SRC -Destination $outName -Force
          "ASSET_PATH=$outName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_NAME=$outName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Stage artifact (macOS .app + .dmg)
        if: matrix.archive_kind == 'macapp'
        shell: bash
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          SRC: ${{ matrix.artifact_glob }}
          OUT: ${{ matrix.asset_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euxo pipefail
          OUT_NAME=$(echo "$OUT" | sed "s/\${VERSION}/$VERSION/")
          APP_DIR="ShinyCounter.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp "$SRC" "$APP_DIR/Contents/MacOS/shiny_counter"
          chmod +x "$APP_DIR/Contents/MacOS/shiny_counter"

          # ---- Pokéball iconset -> icon.icns -----------------------------------
          # The build script wrote a 1024x1024 PNG into OUT_DIR. The path is
          # target/<triple>/release/build/shiny_counter-<hash>/out/icon-1024.png
          ICON_SRC=$(find "target/$TARGET/release/build" -name 'icon-1024.png' | head -1)
          if [ -n "$ICON_SRC" ] && [ -f "$ICON_SRC" ]; then
            ICONSET="ShinyCounter.iconset"
            rm -rf "$ICONSET"
            mkdir "$ICONSET"
            sips -z 16   16   "$ICON_SRC" --out "$ICONSET/icon_16x16.png"
            sips -z 32   32   "$ICON_SRC" --out "$ICONSET/icon_16x16@2x.png"
            sips -z 32   32   "$ICON_SRC" --out "$ICONSET/icon_32x32.png"
            sips -z 64   64   "$ICON_SRC" --out "$ICONSET/icon_32x32@2x.png"
            sips -z 128  128  "$ICON_SRC" --out "$ICONSET/icon_128x128.png"
            sips -z 256  256  "$ICON_SRC" --out "$ICONSET/icon_128x128@2x.png"
            sips -z 256  256  "$ICON_SRC" --out "$ICONSET/icon_256x256.png"
            sips -z 512  512  "$ICON_SRC" --out "$ICONSET/icon_256x256@2x.png"
            sips -z 512  512  "$ICON_SRC" --out "$ICONSET/icon_512x512.png"
            cp "$ICON_SRC"                       "$ICONSET/icon_512x512@2x.png"
            iconutil -c icns "$ICONSET" -o "$APP_DIR/Contents/Resources/icon.icns"
            rm -rf "$ICONSET"
            ICON_PLIST="<key>CFBundleIconFile</key><string>icon</string>"
          else
            echo "No icon-1024.png found - bundle will use the system default."
            ICON_PLIST=""
          fi

          cat > "$APP_DIR/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Shiny Counter</string>
            <key>CFBundleDisplayName</key><string>Shiny Counter</string>
            <key>CFBundleIdentifier</key><string>app.shinycounter</string>
            <key>CFBundleVersion</key><string>$VERSION</string>
            <key>CFBundleShortVersionString</key><string>$VERSION</string>
            <key>CFBundleExecutable</key><string>shiny_counter</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>10.13</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSAppleEventsUsageDescription</key><string>Required to capture pixels from other windows.</string>
            <key>NSScreenCaptureUsageDescription</key><string>Shiny Counter samples on-screen colours to detect Pokémon encounters.</string>
            $ICON_PLIST
          </dict>
          </plist>
          EOF

          # Build a basic .dmg containing the .app
          DMG_STAGE="dmg-stage"
          rm -rf "$DMG_STAGE"
          mkdir -p "$DMG_STAGE"
          cp -R "$APP_DIR" "$DMG_STAGE/"
          ln -s /Applications "$DMG_STAGE/Applications" || true
          hdiutil create -volname "Shiny Counter" -srcfolder "$DMG_STAGE" \
            -ov -format UDZO "$OUT_NAME"
          echo "ASSET_PATH=$OUT_NAME" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$OUT_NAME" >> "$GITHUB_ENV"

      - name: Upload asset to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = process.env.ASSET_PATH;
            const name = process.env.ASSET_NAME;
            const data = fs.readFileSync(path);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release-id }},
              name,
              data,
            });

  publish:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release-id }},
              draft: false,
            });
